name: CI Pipeline

on:
  push:
    branches: ["devops"]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐳 Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗️ Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest ./backend

      # 🏗️ Build Frontend Image (IMPORTANT: env variables)
      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://backend:5000/api \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            --build-arg VITE_STREAM_API_KEY=${{ secrets.VITE_STREAM_API_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest ./frontend

      # 🔍 Scan Backend Image (Trivy official action)
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      # 🔍 Scan Frontend Image
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      # 🚀 Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest

      # 🚀 Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest
