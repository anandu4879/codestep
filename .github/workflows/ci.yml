name: CI Pipeline

on:
  push:
    branches: ["devops"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔐 Dockerfile lint
      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      # 🏗️ Build images
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/codestep-backend:${{ env.IMAGE_TAG }} ./backend

      - name: Build Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://backend:5000/api \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            --build-arg VITE_STREAM_API_KEY=${{ secrets.VITE_STREAM_API_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:${{ env.IMAGE_TAG }} ./frontend

      # 🔍 Scan
      - name: Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/codestep-backend:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: 1

      # 🚀 Push
      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-backend:${{ env.IMAGE_TAG }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/codestep-backend:${{ env.IMAGE_TAG }} ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:${{ env.IMAGE_TAG }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:${{ env.IMAGE_TAG }} ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest
