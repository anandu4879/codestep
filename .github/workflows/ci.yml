name: CI/CD Pipeline

on:
  push:
    branches: [ "devops" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb stable main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 🐳 Login DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🏗️ Build backend
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      # 🔍 Scan backend
      - name: Scan Backend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 🏗️ Build frontend
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      # 🔍 Scan frontend
      - name: Scan Frontend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # 🚀 Push images
      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
