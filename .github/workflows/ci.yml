name: CI Pipeline

on:
  push:
    branches: ["devops"]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐳 Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗️ Build backend image
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest ./backend

      # 🏗️ Build frontend image
      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://backend:5000/api \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            --build-arg VITE_STREAM_API_KEY=${{ secrets.VITE_STREAM_API_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest ./frontend

      # 🛡️ Install Trivy (FIXED - no repo issue)
      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.tar.gz
          tar zxvf trivy_0.50.1_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      # 🔍 Scan backend image
      - name: Scan Backend Image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest

      # 🔍 Scan frontend image
      - name: Scan Frontend Image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest

      # 🚀 Push backend image
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-backend:latest

      # 🚀 Push frontend image
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/codestep-frontend:latest
